# Auto XDP configuration — /etc/auto_xdp/config.toml
# Manage via: axdp trust / axdp acl / axdp permanent
# The daemon reloads this file on SIGHUP (no restart needed).
# To apply changes immediately: axdp restart

[firewall]
# Drop packets with obviously invalid or reserved source addresses
# (RFC1918, loopback, multicast, etc.). Disable only on private networks
# where these source ranges are legitimately expected inbound.
bogon_filter = true

[under_attack]
# When enabled, the daemon tightens rate limits and drops marginal traffic
# automatically during detected flood conditions.
enabled = true

[daemon]
# Log verbosity for the Python sync daemon: debug, info, warning, error.
log_level = "warning"

# How long (seconds) to wait for process/socket change events to settle
# before triggering a reconcile. Larger values reduce churn during
# bursty process restarts; smaller values react faster to port changes.
debounce_seconds = 0.5

# Preferred runtime backend: auto, xdp, nftables.
# auto      = choose the best available backend at runtime.
# xdp       = require XDP mode; fail if unavailable.
# nftables  = force nftables fallback regardless of XDP availability.
preferred_backend = "auto"

[ringbuf]
# Unix socket used by pkt_relay.py and axdp tui.
socket_path = "/var/run/auto_xdp/pkt_events.sock"

# Relay-side history retention for clients that connect later.
retention_seconds = 300
max_events = 10000
max_history_send = 5000

# TUI-side event scrollback kept in the local client process.
tui_max_events = 500

[discovery]
# When true, services bound only to 127.0.0.0/8 or ::1 are ignored;
# they are unreachable from outside anyway.
exclude_loopback = true

# Source CIDRs whose bound listeners are excluded from auto-discovery.
# Useful for admin sockets, VPN-only services, or addresses managed elsewhere.
# Example: exclude_bind_cidrs = ["10.0.0.0/8"]
exclude_bind_cidrs = []

[permanent_ports]
# Ports always kept open regardless of whether the owning process is running.
# SCTP ports are config-managed only — not auto-discovered from sockets.
tcp  = []   # e.g. [80, 443]
udp  = []   # e.g. [53, 123]
sctp = []   # e.g. [5060]

[trusted_ips]
# Source IPs/CIDRs with elevated handling.
# XDP TCP: trusted sources may pass pure SYN packets even when the port was not
# auto-discovered, and they bypass SYN rate limits.
# XDP UDP: trusted sources do NOT open closed UDP ports; the destination UDP
# port must already be whitelisted. Once whitelisted, trusted sources bypass
# UDP rate limits and port handlers.
# nftables fallback: trusted sources are accepted before port checks.
# Format: "CIDR" = "label"
# "10.0.0.0/8"    = "internal network"
# "203.0.113.5/32" = "monitoring host"


# TCP rate limits
# New SYN packets allowed per second per source IP.
# Lookup order: syn_by_proc (process name) → syn_by_service (IANA service name).
# Ports absent from both tables use the default tier (see [xdp.runtime] below).

[rate_limits]
# Aggregation prefix used by syn_agg_rate, per-prefix ESTABLISHED cap, and other
# per-prefix counters. Default /24 for IPv4 so distributed floods from one /24
# share a single counter; per-IP /32 counter still applies independently.
# IPv6 default /64 covers a typical end-site.
source_cidr_v4 = 24
source_cidr_v6 = 64

[rate_limits.syn_by_proc]
# Key: process name as reported by /proc. Value: max new SYNs/s per source IP.
sshd           = 2    # SSH brute-force protection
vsftpd         = 10
proftpd        = 10
"pure-ftpd"    = 10
postfix        = 20
sendmail       = 20
dovecot        = 15
mysqld         = 2
mariadbd       = 2
postgres       = 2
"redis-server" = 2
mongod         = 2
xrdp           = 2
telnetd        = 2

[rate_limits.syn_by_service]
# Fallback when no per-process match exists. Key: IANA service name from /etc/services.
ssh             = 2
ftp             = 10
"ftp-data"      = 10
smtp            = 20
smtps           = 20
submission      = 20
pop3            = 15
pop3s           = 15
imap            = 15
imaps           = 15
mysql           = 2
postgresql      = 2
redis           = 2
mongodb         = 2
"ms-wbt-server" = 2   # RDP
vnc             = 2
telnet          = 2

[rate_limits.syn_agg_by_proc]
# Aggregate SYN rate cap across all source IPs for a given process's ports.
# Useful to bound total SYN flood volume even when per-IP rate is low.
# Format: process_name = max_syns_per_second  (across all sources combined)
# Example:
# caddy = 5000      # each Caddy TCP port: max 5000 SYN/s per source prefix
# sshd  = 50        # each SSH port: max 50 SYN/s per source prefix

[rate_limits.syn_agg_by_service]
# Same as syn_agg_by_proc but keyed by IANA service name. Used when no
# per-process match exists.
# Example:
# http  = 5000
# https = 5000
# ssh   = 50

[rate_limits.tcp_conn_by_proc]
# Max concurrent tracked TCP connections per source IP, per process's ports.
# Helps prevent one client from monopolising connection table slots.
# Format: process_name = max_concurrent_connections_per_source_ip
# Example:
# caddy = 200       # one source IP -> one Caddy port: max 200 established conns
# sshd  = 5         # one source IP -> one SSH port: max 5 established conns

[rate_limits.tcp_conn_by_service]
# Fallback concurrent connection cap keyed by IANA service name.
# Example:
# http  = 200
# https = 200
# ssh   = 5

[rate_limits.tcp_conn_prefix_by_proc]
# Per-prefix ESTABLISHED cap override per process. Format:
# proc_name = max_established_per_prefix
# Empty → uses default_tcp_established_per_prefix(_strict) from [xdp.runtime].
# Example:
# caddy = 2000      # one source prefix -> one Caddy port: max 2000 conns
# sshd  = 20        # one source prefix -> one SSH port: max 20 conns

[rate_limits.tcp_conn_prefix_by_service]
# Same, keyed by IANA service name.
# Example:
# http  = 2000
# https = 2000
# ssh   = 20

[rate_limits.tcp_conn_port_by_proc]
# Per-port total ESTABLISHED cap override per process. Format:
# proc_name = max_established_per_port
# Example:
# caddy = 50000     # each Caddy TCP port total: max 50000 established conns
# sshd  = 200       # each SSH TCP port total: max 200 established conns

[rate_limits.tcp_conn_port_by_service]
# Same, keyed by IANA service name.
# Example:
# http  = 50000
# https = 50000
# ssh   = 200


# UDP rate limits
# UDP is connectionless, so rate limits are the primary abuse control.

[rate_limits.udp_by_proc]
# Max UDP packets per second per source IP for ports owned by this process.
named   = 5000   # DNS — high volume expected from resolvers
unbound = 5000
dnsmasq = 5000
openvpn = 200

[rate_limits.udp_by_service]
# Fallback per-source UDP packet rate cap keyed by IANA service name.
domain  = 5000   # DNS
ntp     = 500    # NTP amplification mitigation
isakmp  = 100    # IKE/VPN negotiation
openvpn = 200

[rate_limits.udp_agg_bytes_by_proc]
# Aggregate UDP byte rate cap (bytes/s) across all sources for this process's ports.
# Blocks amplification floods where many sources each stay under the per-IP limit.
# Format: process_name = max_bytes_per_second

[rate_limits.udp_agg_bytes_by_service]
# Fallback aggregate UDP byte-rate cap keyed by IANA service name.


# Per-CIDR port ACL
# XDP TCP ACL entries explicitly allow matching source CIDRs to reach listed
# TCP ports even when those ports were not auto-discovered, and bypass TCP SYN
# rate limits.
# XDP UDP ACL entries do not open closed UDP ports; the destination UDP port
# must already be whitelisted. Once whitelisted, matching ACL entries bypass
# UDP rate limits and port handlers.
#
# [[acl]]
# proto = "tcp"          # "tcp" or "udp"
# cidr  = "10.0.0.0/8"  # source CIDR to allow
# ports = [5432, 6379]   # destination ports covered by this ACL


# Protocol slot handlers
# bpf_tail_call dispatch table for non-TCP/UDP/ICMP protocols (GRE, ESP, SCTP…).

[tunnel]
# Allowed outer IPv4 source addresses for 6in4 (protocol 41) tunnel endpoints.
# XDP passes proto-41 only from these IPs; all others are dropped at line rate
# before the kernel wastes CPU on SIT decapsulation.
# Obtain the remote endpoint IP from your tunnel provider (e.g. Hurricane Electric).
# Example: sit4_endpoints = ["216.218.226.238"]
sit4_endpoints = []

[slots]
# Action when a non-TCP/UDP/ICMP packet arrives and no handler is loaded.
# "pass" = forward to kernel (backward-compatible default before handlers existed).
# "drop" = enforce an explicit allow-list; unknown protocols are blocked.
default_action = "drop"

# Built-in handlers to load at startup.
# Named options: "gre" (proto 47), "esp" (proto 50), "sctp" (proto 132).
# Custom handlers: { proto = N, path = "/path/to/handler.o" }
# Example: enabled = ["sctp", "gre"]
enabled = []

[abuseipdb]
# Threat-intel blocklist: drops source IPs listed in borestad/blocklist-abuseipdb.
# No API key required. trusted_ips still bypass AbuseIPDB (trusted wins).
# enabled = false  →  maps stay empty, no traffic blocked (fail-open).
enabled = false

# Blocklist sources to fetch (confidence score 100 = max confidence).
# Available windows: 1d, 3d, 7d, 14d, 30d, 60d, 90d, 120d.
# Shorter windows = fewer stale entries (esp. for IPv6 SLAAC privacy churn).
# Example: sources = ["s1003d"]  or  sources = ["s10030d"]
sources = ["s1003d"]

# Refresh interval in seconds. Minimum 60s. Recommended: 3600 (1 hour).
refresh_seconds = 3600

[port_handlers]
# Per-port BPF tail-call handlers for deep packet inspection.
# Handlers run after the main whitelist/rate-limit pass for the port.

[port_handlers.tcp]
# Example: 443 = "/usr/lib/auto_xdp/handlers/tls_sni.o"

[port_handlers.udp]
# Example: 53 = "/usr/lib/auto_xdp/handlers/dns_validate.o"


# XDP backend

[xdp]
# BPF map pin directory. All per-map pin paths are derived from this prefix.
# Change only if bpffs is mounted at a non-standard location.
# Requires daemon restart to take effect.
bpf_pin_dir = "/sys/fs/bpf/xdp_fw"

# How many consecutive reconcile rounds a conntrack entry must be absent from
# the observed socket table before the daemon removes it from the BPF map.
# Higher values tolerate brief process restarts without dropping active flows.
conntrack_stale_reconciles = 2

[xdp.runtime]
# How long (seconds) an established TCP flow's conntrack entry stays valid
# without seeing new packets. Flows idle longer than this are evicted.
tcp_timeout_seconds = 300

# How long (seconds) a UDP conntrack entry (created by TC egress tracking)
# remains valid. Shorter than TCP since UDP is connectionless.
udp_timeout_seconds = 60

# Minimum interval (seconds) between conntrack timestamp refreshes.
# Entries seen more recently than this are not re-stamped, reducing write load.
conntrack_refresh_seconds = 30

# Interval (seconds) between full conntrack map GC sweeps that expire stale
# entries. Reduces LRU eviction pressure under sustained traffic. 0 = disabled.
conntrack_gc_interval_seconds = 300

# Maximum number of ICMP echo requests queued in the token bucket before
# rate limiting kicks in (burst allowance).
icmp_burst_packets = 100

# Sustained ICMP echo request rate allowed per second (packets/s).
# Requests beyond this rate are dropped after the burst bucket empties.
icmp_rate_pps = 100

# Sliding-window duration (seconds) for the global UDP byte-rate limiter.
# A shorter window reacts faster; a longer window smooths out bursts.
udp_global_window_seconds = 1

# Global UDP byte-rate cap across all whitelisted ports (megabits/s). 0 = disabled.
# Blocks volumetric floods from many low-rate sources that bypass per-IP limits.
# Example: 1000 caps total ingress UDP at ~1 Gbps (~125 MB/s).
udp_global_byte_rate_mbps = 997

# Sliding-window duration (seconds) for per-IP and per-prefix rate limiters
# (SYN rate, UDP packet rate, aggregate byte rate).
rate_window_seconds = 1

# Half-open (SYN-only) conntrack TTL (seconds). Entries that never receive
# an ACK are expired faster than tcp_timeout_seconds to free map slots under
# SYN flood. Increase if clients have high-latency links (> 100 ms RTT).
syn_timeout_seconds = 20

# --- Default-on TCP protection ---
# Sensitivity threshold: a port is "sensitive" when its owning process or
# service has an explicit syn-rate ≤ this value in [rate_limits.syn_by_proc]
# / [rate_limits.syn_by_service]. Sensitive ports get the strict default tier;
# everything else gets the normal tier.
sensitive_port_threshold = 5

# Per-source SYN rate (SYN/s). L1 — narrowest layer.
default_tcp_syn_rate_strict = 5      # SSH, DBs, RDP — already in syn_by_*
default_tcp_syn_rate        = 100    # HTTP/HTTPS/games/RPC/anything else

# Per-prefix aggregate SYN rate (SYN/s). L2 — caps distributed floods.
default_tcp_syn_agg_rate_strict = 50
default_tcp_syn_agg_rate        = 1000

# Per-source ESTABLISHED concurrent connections (sessions). L3.
default_tcp_established_per_src_strict = 5
default_tcp_established_per_src        = 50

# Per-prefix ESTABLISHED concurrent connections (sessions). L4.
default_tcp_established_per_prefix_strict = 20
default_tcp_established_per_prefix        = 200

# Per-port total ESTABLISHED concurrent connections (sessions). L5.
default_tcp_established_per_port_strict = 200
default_tcp_established_per_port        = 5000


# nftables fallback
# Used only when the nftables backend is active instead of XDP.
# Requires daemon restart to take effect.

[nftables]
# nftables table address family: inet (IPv4+IPv6), ip (IPv4 only), ip6 (IPv6 only).
family = "inet"

# nftables table name. The daemon creates and manages this table exclusively.
table = "auto_xdp"
