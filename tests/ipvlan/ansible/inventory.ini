# auto_xdp_ipvlan stateful firewall test inventory
#
# Topology (192.168.100.0/24 via eth1):
#   host    .3  — runs IPVLAN container + XDP + TC eBPF
#   target  .4  — legitimate reply server (scenario 1)
#   attacker .5 — unsolicited inbound generator (scenario 2)

[host_node]
host ansible_host=192.168.100.3 ansible_connection=local

[target_node]
target ansible_host=192.168.100.4

[attacker_node]
attacker ansible_host=192.168.100.5

[all:vars]
ansible_user=geonmo
ansible_python_interpreter=/usr/bin/python3

# Container networking
container_ip=192.168.100.10
host_iface=eth1
target_ip=192.168.100.4
attacker_ip=192.168.100.5
